data:
  raw_data: data/raw/students.csv
  processed_dir: data/processed
  target_col: exam_score
  drop_cols:
    - student_id
  test_size: 0.2
  val_size: 0.1

training:
  random_seed: 42
  compare_metric: r2

models:
  enabled:
    - linear_regression
    - decision_tree
    - random_forest
    - gradient_boosting
    - ann

  decision_tree:
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1

  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    n_jobs: -1

  gradient_boosting:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 3
    subsample: 1.0

  ann:
    hidden_layers: [128, 64, 32]
    dropout: 0.0
    batch_size: 64
    epochs: 50
    learning_rate: 0.001
    weight_decay: 0.0
    patience: 10
