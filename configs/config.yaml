project:
  name: student-score-calculator
  random_seed: 42

paths:
  raw_data: data/raw/students.csv
  processed_dir: data/processed
  artifacts_dir: artifacts
  models_dir: artifacts/models
  preprocessor_path: artifacts/scaler/preprocessor.pkl
  metrics_path: artifacts/metrics.json
  predictions_path: artifacts/predictions.csv

data:
  target_col: exam_score
  drop_cols:
    - student_id
  test_size: 0.2
  val_size: 0.1   # fraction of (train+val) reserved for val after test split

training:
  compare_metric: r2  # best model chosen by highest metric

mlflow:
  tracking_uri: null  # null => use default local ./mlruns
  experiment_name: student_exam_score_prediction
  register_best_model: true
  registered_model_name: student_exam_score_best
  stage_after_register: Staging  # one of: null, Staging, Production

models:
  enabled:
    - linear_regression
    - decision_tree
    - random_forest
    - gradient_boosting
    - ann

  linear_regression: {}

  decision_tree:
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1

  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    n_jobs: -1

  gradient_boosting:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 3
    subsample: 1.0

  ann:
    hidden_layers: [128, 64, 32]
    dropout: 0.0
    batch_size: 64
    epochs: 50
    learning_rate: 0.001
    weight_decay: 0.0
    device: auto   # auto|cpu|cuda
    patience: 10   # early stopping patience on val loss
